# --- Concept: Scale States ---
# Several settings below (width_ratio, height_ratio, scale, alpha, rotate, shape) accept
# comma-separated lists. Each position in the list defines a "scale state", and you can
# cycle through them by pressing the scale_key. For example, if scale=0.75,+1.5, pressing
# the key alternates between state 1 (0.75) and state 2 (+1.5).
# If one setting has fewer values than others, its last value is reused for the extra states.

# Key to show/hide the minimap.
# Default: M
toggle_key=M

# Key to cycle through scale states (see above).
# If set to the same key as toggle_key, an extra hidden state (scale=0) is appended to
# the cycle, so the key toggles: state 1 -> state 2 -> ... -> hidden -> state 1.
# Default: M
scale_key=M

# Key to toggle site-of-grace markers on the minimap.
# Default: N
graces_key=N

# Show site-of-grace markers by default (1 = yes, 0 = no).
# Toggle at runtime with graces_key. Only graces you have discovered in-game are shown.
# Default: 1
graces=1

# Key to toggle landmark markers on the minimap.
# Default: N
landmarks_key=N

# Show landmark markers by default (1 = yes, 0 = no).
# Toggle at runtime with landmarks_key. Only landmarks you have discovered in-game are shown.
# Default: 1
landmarks=1

# Minimap width as a percentage of screen height (not screen width — this ensures a
# consistent aspect ratio regardless of resolution).
# Comma-separated per scale state.
# Default: 30%,90%
width_ratio=30%,90%

# Minimap height as a percentage of screen height.
# Comma-separated per scale state.
# Default: 30%,90%
height_ratio=30%,90%

# Map zoom scale for each state. Larger values show more of the map.
# Prefix a value with '+' to center the minimap on screen; without '+' it stays in the
# top-right corner. A value of 0 hides the minimap entirely.
# Default: 0.75,+1.5
scale=0.75,+1.5

# Minimap opacity for each state (0.0 = fully transparent, 1.0 = fully opaque).
# Default: 0.8,0.6
alpha=0.8,0.6

# Rotate the minimap to match the camera's facing direction (1 = enable, 0 = disable).
# When enabled, the shape is forced to circle and the forward direction always points up.
# Comma-separated per scale state.
# Default: 0 (disabled for all states)
# rotate=1,0

# Minimap shape for each state: rect, rounded, or circle.
# Comma-separated per scale state.
# Default: rect (for all states)
# shape=rect,circle

# Corner rounding radius for the "rounded" shape.
# Accepts a percentage of min(width, height)/2 (e.g. 20%) or a pixel value (e.g. 30).
# 50% approximates a circle. Ignored when shape is "circle".
# Default: 20%
# rounding=20%

# Border color as R,G,B,A (each 0-255).
# Default: 255,255,255,100 (semi-transparent white)
# border_color=255,255,255,100

# Border width, specified as actual_width * 10 (e.g. 15 = 1.5px, 10 = 1.0px).
# Set to 0 to disable the border.
# Default: 15 (1.5px)
# border_width_x10=15

# --- Extra Scale Multipliers ---
# These multipliers adjust the rendered size of individual minimap elements.
# Each is applied on top of the base scale. Comma-separated per scale state;
# if fewer values are provided, the last value is reused for remaining states.
# Default: 1 (no additional scaling)

# Multiplier for map tile zoom level.
# extra_tile_scale=1

# Multiplier for decoration icon size (grace and landmark markers).
# extra_decoration_scale=1

# Multiplier for player marker size (player dot and direction arrow).
# extra_player_scale=1

# Multiplier for bearing compass size (only used when rotate is enabled).
# extra_bearing_scale=1
