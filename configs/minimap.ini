# Set key to toggle the minimap.
# Default value is M
toggle_key=M

# Set key to switch ratio/scale/alpha values cycle.
# Be note that if the count of ratio/scale/alpha values is not equal, the last value will be used for the missing values.
#   e.g. if the ratio value is 30% and the scale values are 0.5,0.75,1, %30 will be used for all 3 settings in cycle.
# If scale_key == toggle_key, toggle_key will be ignored, and an extra state(zero scale value) will be added to the
# end of the list, which hides the minimap.
# Default value is M
scale_key=M

# Set key to show/hide graces (from BonfireWarpParam) on the minimap.
# Default value is N.
graces_key=N

# Set to 1 to show graces on the minimap by default.
# You can toggle the visibility by pressing the graces_key above.
# Note: the graces will not be shown if you have not enabled them in game.
# Default value is 1.
graces=1

# Set key to show/hide landmarks (from WorldMapPointParam) on the minimap.
# Default value is N.
landmarks_key=N

# Set to 1 to show landmarks on the minimap by default.
# You can toggle the visibility by pressing the landmarks_key above.
# Note: the landmarks will not be shown if you have not enabled them in game.
# Default value is 1.
landmarks=1

# Set width and height ratio of the minimap.
# You can switch among them by pressing the scale_key above.
# Note that the width is also calculated based on the window/screen height.
# Default value is 30%,90% for both width and height.
width_ratio=30%,90%
height_ratio=30%,90%

# Set scale values of the minimap.
# You can switch among them by pressing the key above.
# A leading plus sign means the minimap is centered on the screen, otherwise it is on the top right corner.
# A zero value means the minimap is not visible.
# Default value is 0.75,+1.5
scale=0.75,+1.5

# Set alpha channel value(aka. opacity) of the minimap.
# Default value is 0.8,0.6.
alpha=0.8,0.6

# Rotate the minimap to match the player's facing direction.
# When enabled, the shape is forced to circle, and the player's forward direction always points up.
# Decorations with rotationRad=0 keep their screen orientation; others rotate with the map.
# Set to 1 to enable, 0 to disable. Comma-separated for each scale state.
# Default value is 0 for all states.
# rotate=1,0

# Set the shape of the minimap for each scale state.
# Possible values: rect, rounded, circle
# You can set different shapes for each scale state, separated by commas.
# Default value is rect for all states.
# shape=rect,circle

# Set the rounding radius for rounded shape.
# Use a percentage (e.g. 20%) of min(width, height)/2, or a pixel value (e.g. 30).
# 50% approximates a circle. Ignored when shape=circle.
# Default value is 20%.
# rounding=20%

# Set the border color of the minimap shape (R,G,B,A, each 0-255).
# Default value is 255,255,255,100 (semi-transparent white).
# border_color=255,255,255,100

# Set the border width of the minimap shape (multiplied by 10, e.g. 15 = 1.5px).
# Set to 0 to disable the border.
# Default value is 15 (1.5px).
# border_width_x10=15
