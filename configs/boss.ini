# Key to toggle between mini mode (compact status line) and full mode (expandable boss list).
# See input.ini for available key names.
# Default: =
toggle_full_mode==

# Boss data filename, located in the `data/<language>/` folder.
data_file=bosses.json

# Allow resetting a defeated boss's kill flag by clicking its checkbox in the full-mode panel.
# A confirmation popup will appear before the reset takes effect.
allow_revive=false

# Panel position and size: x, y, width, height
# Each value can be a pixel count (e.g. 10) or a screen percentage (e.g. 15%).
# Negative x/y values are relative to the right/bottom edge of the screen.
# Set width or height to 0 to auto-size the panel in that direction.
# Example: -10,10,15%,90% places the panel 10px from the right edge, 10px from the top,
#   spanning 15% of screen width and 90% of screen height.
panel_pos=-10,10,15%,90%

# Format string for the boss kill count display.
# Placeholders:
#   {kills}  - number of bosses killed
#   {total}  - total number of bosses
#   {deaths} - total death count in the current save
#   {igt}    - in-game time (auto-formats as H:MM:SS or MM:SS)
#   $n       - line break
boss_kill_text={kills}/{total}

# Enable challenge mode. When enabled, boss kills stop being recorded once your
# death count exceeds the limit set by challenge_death_count.
challenge_mode=false

# Maximum number of deaths allowed in challenge mode (inclusive).
# Set to 0 for a no-death run; set to 1 to allow exactly one death; and so on.
# The challenge fails when deaths exceed this number.
challenge_death_count=0

# Format string for the challenge mode status display.
# Placeholders (in addition to those listed in boss_kill_text):
#   {pb}    - personal best (highest kill count across all attempts)
#   {tries} - total number of failed attempts
challenge_status_text=PB: {pb}/{total}  Tries: {tries}$nCurrent: {kills}/{total}
