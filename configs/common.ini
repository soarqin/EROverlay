# Enable a debug console window for troubleshooting.
console=false

# Font file path, relative to the `data` folder (or an absolute path).
# Leave empty to use the following fallback order:
#   1. Built-in embedded font (Latin character sets only).
#   2. System font resolved from the Windows registry (Segoe UI, with fallbacks).
font=

# Font size in points.
# Default: 20
font_size=20

# Character set for font rendering. Determines which glyphs are loaded.
# Available values (grouped by script):
#   Latin:      enUS, frFR, deDE, esES, esAR, itIT, ptBR
#   Latin+:     plPL  (includes extra Polish characters)
#   Cyrillic:   ruRU
#   Japanese:   jaJP
#   Korean:     koKR
#   Thai:       thTH
#   CJK:        zhCN, zhTW
# Leave empty to auto-detect from the game language.
charset=

# Language used to load data files (boss names, region names, etc.).
# Must match a subfolder name under `data/` (e.g. engUS, zhoCN).
# Leave empty to auto-detect from the game language.
language=
