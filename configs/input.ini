# Key names can be combined with '+' for shortcuts, e.g. CTRL+SHIFT+[
#
# Available key names:
#   Letters:     A-Z
#   Digits:      0-9
#   Function:    F1-F24
#   Numpad:      NUMPAD0-NUMPAD9 (or NUM0-NUM9), MULTIPLY, ADD, SUBTRACT, MINUS, DECIMAL, DIVIDE
#   Navigation:  LEFT, UP, RIGHT, DOWN, HOME, END, PAGEUP, PAGEDOWN, INSERT, DELETE
#   Modifiers:   CTRL, ALT, SHIFT, WIN  (combinable with '+')
#   Editing:     BACK (or BACKSPACE), TAB, RETURN (or ENTER), SPACE, ESCAPE (or ESC)
#   Toggle:      CAPITAL (or CAPSLOCK), NUMLOCK, SCROLL
#   System:      PAUSE, PRINT (or SNAPSHOT), APPS
#   Browser:     BROWSER_BACK, BROWSER_FORWARD
#   Symbols:     =  ,  -  .  ;  /  ~  [  \  ]  '
#
# Side-specific keys (LWIN, RWIN, LALT, RALT, LCTRL, RCTRL, LSHIFT, RSHIFT) can only
# be used as standalone keys — they CANNOT be used as modifiers in key combinations.

# Key to unload the mod at runtime. Leave empty to disable.
unload=
